name: Build Desktop (Windows)

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Tauri Build (Windows x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Create CI Tauri config (no updater artifacts)
        shell: pwsh
        run: |
          $config = Get-Content 'apps/desktop/src-tauri/tauri.conf.json' | ConvertFrom-Json
          $config.bundle | Add-Member -NotePropertyName 'createUpdaterArtifacts' -NotePropertyValue $false -Force
          $config | ConvertTo-Json -Depth 20 | Set-Content 'apps/desktop/src-tauri/tauri.conf.ci.json'

      - name: Resolve OpenCode version
        id: opencode-version
        shell: pwsh
        run: |
          $parsed = Get-Content 'constants.json' | ConvertFrom-Json
          $version = $parsed.opencodeVersion -replace '^v', ''
          if (-not $version) { Write-Error 'opencodeVersion missing from constants.json'; exit 1 }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Download OpenCode sidecar
        shell: pwsh
        env:
          PINNED_OPENCODE_VERSION: ${{ steps.opencode-version.outputs.version }}
          GITHUB_TOKEN: ${{ github.token }}
          OPENCODE_GITHUB_REPO: ${{ vars.OPENCODE_GITHUB_REPO || 'anomalyco/opencode' }}
        run: |
          $ErrorActionPreference = 'Stop'
          $version = $env:PINNED_OPENCODE_VERSION
          $repo = if ($env:OPENCODE_GITHUB_REPO) { $env:OPENCODE_GITHUB_REPO } else { 'anomalyco/opencode' }
          $asset = 'opencode-windows-x64-baseline.zip'
          $url = "https://github.com/$repo/releases/download/v$version/$asset"
          $tmpDir = Join-Path $env:RUNNER_TEMP 'opencode'
          $extractDir = Join-Path $tmpDir 'extracted'
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          $headers = @{}
          if ($env:GITHUB_TOKEN) { $headers['Authorization'] = "Bearer $($env:GITHUB_TOKEN)" }
          Invoke-WebRequest -Uri $url -OutFile (Join-Path $tmpDir $asset) -Headers $headers
          Expand-Archive -Path (Join-Path $tmpDir $asset) -DestinationPath $extractDir -Force
          $binPath = Join-Path $extractDir 'opencode.exe'
          if (-not (Test-Path $binPath)) {
            Write-Error 'OpenCode binary not found in archive'
            Get-ChildItem $extractDir
            exit 1
          }
          $sidecarDir = 'apps/desktop/src-tauri/sidecars'
          New-Item -ItemType Directory -Force -Path $sidecarDir | Out-Null
          Copy-Item $binPath (Join-Path $sidecarDir 'opencode-x86_64-pc-windows-msvc.exe')

      - name: Prepare desktop sidecars
        run: pnpm -C apps/desktop prepare:sidecar

      - name: Build desktop app
        run: pnpm --filter @openwork/desktop exec tauri build --config src-tauri/tauri.conf.ci.json --target x86_64-pc-windows-msvc --bundles nsis
