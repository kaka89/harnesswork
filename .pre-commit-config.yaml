# Harness Engineering Pre-commit 配置
# 由 `he init` 自动生成
# 安装: pip install pre-commit && pre-commit install
# 文档: https://pre-commit.com

repos:
  # ─── 基础代码规范 ───
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace           # 清除行尾空格
      - id: end-of-file-fixer             # 确保文件以换行结尾
      - id: check-yaml                    # YAML 语法校验
        args: ['--allow-multiple-documents']
      - id: check-json                    # JSON 语法校验
      - id: check-merge-conflict          # 检测遗留的合并冲突标记
      - id: check-added-large-files       # 防止提交大文件（>500KB）
        args: ['--maxkb=500']
      - id: no-commit-to-branch           # 禁止直接提交到 main/master
        args: ['--branch', 'main', '--branch', 'master']

  # ─── 敏感信息检测（Gitleaks）───
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks                      # 扫描提交中的密钥/密码/Token

  # ─── Markdown 格式检查 ───
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.41.0
    hooks:
      - id: markdownlint
        args: ['--disable', 'MD013', 'MD033', 'MD041', '--']

  # ─── Shell 脚本检查 ───
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: ['--severity=warning']

# ─── 额外说明 ───
# commit-msg hook 单独配置在 .githooks/commit-msg 中
# 需要执行: git config core.hooksPath .githooks
